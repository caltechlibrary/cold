#
# cold_api.yaml defines the controlled object list with Dataset JSON API.
#
# @author: R. S. Doiel <rsdoiel@caltech.edu>
#
host: localhost:8112
# This htdocs directory is provided by cold_ui so we don't enable it.
#htdocs: htdocs
collections:
  # Each collection is an object. The path prefix is
  # /api/<dataset_name>/...
  - dataset: people.ds
    query:
      people_vocabulary: |
        SELECT
          json_object(
            'clpid', src->'clpid',
            'family_name', src->'family_name',
            'given_name', src->'given_name',
            'debug_orcid', src->'orcid',
            'debug_orcid_length', length(src->>'orcid'),
            'identifiers',
              CASE
                WHEN length(src->>'orcid') > 1 THEN
                  json_array(
                    json_object(
                      'scheme', 'clpid',
                      'identifier', src->'clpid'
                    ),
                    json_object(
                      'scheme', 'orcid',
                      'identifier', src->'orcid'
                    )
                  )
                WHEN length(src->>'orcid') = 0 THEN
                  json_array(
                    json_object(
                      'scheme', 'clpid',
                      'identifier', src->'clpid'
                    )
                  )
                ELSE json_array()
              END,
            'affiliations',
              CASE
                WHEN src->>'ror' = 'https://ror.org/05dxps055' THEN
                  json_array(
                    json_object(
                      'id', replace(src->>'ror', 'https://ror.org/', ''),
                      'name', 'Caltech'
                    )
                  )
                ELSE json_array()
              END
          ) AS src
        FROM people
        ORDER BY src->'family_name' ASC, src->'given_name' ASC

      people_names: |
        select json_object(
          'clpid', src->'clpid',
          'family_name', src->'family_name',
          'given_name', src->'given_name',
          'orcid', ifnull(src->'orcid', ''),
          'thesis_id', ifnull(src->'thesis_id', ''),
          'directory_id', ifnull(src->'directory_user_id', '')) as src
        from people
        order by src->'family_name' ASC, src->'given_name' ASC;
      missing_bios: |
        select json_object('clpid', json_extract(src, '$.clpid'), 'ims_uid', json_extract(src, '$.directory_user_id')) as src
        from people
        where json_extract(src, '$.directory_user_id') != '' and json_extract(src, '$.bio') == '';
      directory_people: |
        select json_object(
            'clpid', json_extract(src, '$.clpid'),
            'imss_uid', json_extract(src, '$.directory_user_id'), 'caltech', json_extract(src, '$.caltech')
          ) as src
        from people
        where json_extract(src, '$.directory_user_id') != '';
      # family_name,given_name,cl_people_id,thesis_id,advisor_id,authors_id,archivesspace_id,directory_id,viaf_id,lcnaf,isni,wikidata,snac,orcid,image,educated_at,caltech,jpl,faculty,alumn,staff,postdoc,visitor,retired,emeritus,status,directory_person_type,title,bio,division,authors_count,thesis_count,data_count,advisor_count,editor_count,updated
      people_csv: |
        select json_object(
          'family_name', src->'family_name',
          'given_name', src->'given_name',
          'cl_people_id', src->'clpid',
          'thesis_id', src->'thesis_id',
          'advisor_id', src->'advisor_id',
          'authors_id', src->'authors_id',
          'archivesspace_id', src->'archivesspace_id',
          'directory_id', src->'directory_user_id',
          'viaf_id', src->'viaf',
          'lcnaf', src->'lcnaf',
          'isni', src->'isni',
          'wikidata', src->'wikidata',
          'orcid', src->'orcid',
          'image', '',
          'educated_at', src->'educated_at',
          'caltech', src->'caltech',
          'jpl', src->'jpl',
          'faculty', src->'faculty',
          'alumn', src->'alumn',
          'staff', src->'staff',
          'postdoc', src->'postdoc',
          'visitor', src->'visitor',
          'retired', src->'retired',
          'emeritus', src->'emeritus',
          'status', src->'status',
          'directory_person_type', src->'directory_person_type',
          'title', src->'title',
          'bio', src->'bio',
          'division', src->'division',
          'authors_count', '', 'thesis_count', '', 'data_count', '', 'advisor_count', '', 'editor_count', '',
          'updated', '', 'include_in_feeds', src->'include_in_feeds') as src
        from people order
        by src->'family_name', src->'given_name'
      # Provide a report of divisions and their members
      division_people: |
        select json_object(
          'division', src->'division', 'clpid', src->'clpid', 'orcid', src->'orcid',
          'family_name', src->'family_name', 'given_name', src->'given_name' ) as src
        from people
        where where src->'division' is not null and
          src->>'division' <> ''
        order by src->>'division', src->>'family_name', src->>'given_name'
      # People  Membership report, expands clgid per group per clpid
      people_membership: |
        WITH flattened_data AS (
            SELECT
                json_extract(src, '$.clpid') AS clpid,
                json_extract(src, '$.orcid') AS orcid,
                json_extract(src, '$.family_name') AS family_name,
                json_extract(src, '$.given_name') AS given_name,
                json_extract(g.value, '$.clgid') AS clgid,
                json_extract(g.value, '$.group_name') AS group_name
            FROM
                people,
                json_each(json_extract(src, '$.groups')) AS g
        )
        SELECT
            json_object(
              'clgid', clgid,
                'group_name', group_name,
              'clpid', clpid,
              'orcid', orcid,
                'family_name', family_name,
                'given_name', given_name
            ) as obj
        FROM
            flattened_data
        ORDER BY
            clgid, clpid;
      # Get a list of all clpid as string for autocomplete
      get_all_clpid: |
        select src->'clpid'
        from people
        order by src->>'clpid'

      # Look up person by clpid
      validate_clpid: |
        select json_object('clpid', src->'clpid')
        from people
        where json_extract(src, '$.clpid') = ?
      # Retrieve a full person record by clpid
      lookup_person_by_clpid: |
        select src from people
        where json_extract(src, '$.clpid') = ?
      # Rename a person's clpid — updates both the record key and the clpid field
      rename_clpid: |
        UPDATE people SET _key = ?, src = json_set(src, '$.clpid', ?) WHERE _key = ?
      # What follows are object level permissions
      lookup_clgid: |
        select json_object(
          'clpid', src->'clpid',
          'family_name', src->'family_name',
          'given_name', src->'given_name') as src
        from people
        where exists (select true from json_each(src, '$.groups') where json_extract(value, '$.clgid') = ?)
        order by src->'family_name' ASC, src->'given_name' asc;
    keys: true
    create: true
    read: true
    update: true
    # This sets versioning behavior
    versions: true
  - dataset: groups.ds
    query:
      group_vocabulary: |
        select json_object('clgid', src->'clgid', 'group_name', src->'name') as src
        from groups
        order by src->'name' asc;
      group_names: |
        select json_object('clgid', src->'clgid', 'group_name', src->'name') as src
        from groups
        order by src->'name' asc;
      lookup_name: |
        select json_object('clgid', src->'clgid', 'group_name', src->'name')
        from groups
        where (src->>'name' like ?) or
              exists(
                    select true
                    from json_each(src->'alternative')
                    where (json_each.value like ?)
              )
        order by src->>'name' asc;
      lookup_name_or_clgid: |
        select json_object('clgid', src->'clgid', 'group_name', src->'name')
        from groups
        where (src->>'name' like ?) or
              (src->>'clgid' like ?) or
              exists(
                    select true
                    from json_each(src->'alternative')
                    where (json_each.value like ?)
              )
        order by src->>'name' asc;
      # Get a list of clgid as strings for autocomplete
      get_all_clgid: |
        select src->'clgid'
        from groups
        order by src->>'clgid'
      # Look up group by clgid for validation
      validate_clgid: |
        select json_object('clgid', src->'clgid')
        from groups
        where json_extract(src, '$.clgid') = ?

    # What follows are object level permissions
    keys: true
    create: true
    read: true
    update: true
    # This sets versioning behavior
    versions: true
  - dataset: funders.ds
    query:
      funder_names: |
        select json_object('clfid', src->'clfid', 'name', src->'name', 'ror', src->'ror') as src
        from funders
        order by src->'name';
    # What follows are object level permissions
    keys: true
    create: true
    read: true
    update: true
    # This sets versioning behavior
    versions: true
  - dataset: subjects.ds
    query:
      subject_names: |
        select json_object('clsid', src->'clsid', 'name', src->'name') as src
        from subjects
        order by src->'name';
    # What follows are object level permissions
    keys: true
    create: true
    read: true
    update: true
    # This sets versioning behavior
    versions: true
  - dataset: thesis_options.ds
    query:
      thesis_option_names: |
        select json_object(
           'option_id', src->'option_id',
           'name', src->'name',
           'division', src->'division'
        ) as src
        from thesis_options
        order by src->'name';
    # What follows are object level permissions
    keys: true
    create: true
    read: true
    update: true
    # This sets versioning behavior
    versions: true
  - dataset: journals.ds
    query:
      journal_names: |
        select json_object('issn', src->'issn', 'name', src->'name') as src
        from journals
        order by src->'name';
    # What follows are object level permissions
    keys: true
    create: true
    read: true
    update: true
    # This sets versioning behavior
    versions: true
  - dataset: doi_prefix.ds
    query:
      doi_prefix_names: |
        select json_object('doi_prefix', src->'doi_prefix', 'name', src->'name') as src
        from doi_prefix
        order by src->'name';
    # What follows are object level permissions
    keys: true
    create: true
    read: true
    update: true
    # This sets versioning behavior
    versions: true
  - dataset: reports.ds
    query:
      # report_list shows the report requests in a stack view, most recently changed at the time regardless of status
      report_list: |
        select json_object('id', src->'id', 'link', src->'link', 'content_type', src->'content_type',
          'report_name', src->'report_name', 'emails', src->'emails', 'status', src->'status',
          'requested', src->'requested', 'updated', src->'updated') as src
        from reports
        order by src->>'updated' desc;
      # get_report retrieves status and link for a single report by its id
      get_report: |
        select json_object('id', src->'id', 'status', src->'status', 'link', src->'link',
          'report_name', src->'report_name', 'updated', src->'updated')
        from reports
        where json_extract(src, '$.id') = ?
      # next request implements the FIFO, i.e. a queue
      next_request: |
        select json_object('id', src->'id', 'link', src->'link', 'content_type', src->'content_type',
          'report_name', src->'report_name', 'emails', src->'emails', 'status', src->'status',
          'inputs', src->'inputs',
          'requested', src->'requested', 'updated', src->'updated') as src
        from reports
        where src->>'status' = 'requested'
        order by src->>'updated' asc;
    keys: true
    read: true
    create: true
    update: true
    # This sets versioning behavior
    versions: true
  - dataset: ror.ds
    query:
      # Retrieve ROR by ror prefix value
      get_ror: |
        select src
        from ror
        where _key = ?;
      # Lookup a ror
      lookup_by_name_or_acronym: |
        select json_object(
          'ror', _key,
          'name', src->'name',
          'country', src->'country',
          'acronyms', src->'acronyms'
        ) as src
        from ror
        where src->>'name' like ?
          or exists (
            select 1
            from json_each(src->'acronyms')
            where value like ?)
        order by src->'name';
      # Lookup a ror by name
      lookup_by_name: |
        select json_object(
          'ror', _key,
          'name', src->'name',
          'country', src->'country',
          'acronyms', src->'acronyms'
        ) as src
        from ror
        where src->>'name' like ?
        order by src->'name';
      # Lookup a ror by acronym
      lookup_by_acronym: |
        select json_object('ror', _key,
          'name', src->'name',
          'country', src->'country',
          'acronyms', src->'acronyms'
        ) as src
        from ror
        where exists (
            select 1
            from json_each(src->'acronyms')
            where value like ?)
        order by src->'name';
      # Lookup ROR entries by ISO 3166-1 alpha-2 country code.
      # Handles both ROR v2 (names array with ror_display/label types) and v1 (name field).
      ror_by_country_code: |
        select json_object(
          'ror', _key,
          'name', COALESCE(
            (select n.value->>'value'
             from json_each(src->'names') as n
             where exists (
               select 1 from json_each(n.value->'types') as t where t.value = 'ror_display'
             )
             limit 1),
            (select n.value->>'value'
             from json_each(src->'names') as n
             where n.value->>'lang' = 'en'
               and exists (
                 select 1 from json_each(n.value->'types') as t where t.value = 'label'
               )
             limit 1),
            json_extract(src, '$.name')
          ),
          'country_code', COALESCE(
            json_extract(src, '$.locations[0].geonames_details.country_code'),
            json_extract(src, '$.country.country_code'),
            json_extract(src, '$.country.code')
          ),
          'country_name', COALESCE(
            json_extract(src, '$.locations[0].geonames_details.country_name'),
            json_extract(src, '$.country.country_name'),
            json_extract(src, '$.country.name')
          )
        ) as src
        from ror
        where COALESCE(
          json_extract(src, '$.locations[0].geonames_details.country_code'),
          json_extract(src, '$.country.country_code'),
          json_extract(src, '$.country.code')
        ) = ?
        order by COALESCE(
          (select n.value->>'value'
           from json_each(src->'names') as n
           where exists (
             select 1 from json_each(n.value->'types') as t where t.value = 'ror_display'
           )
           limit 1),
          json_extract(src, '$.name')
        )
      # clear the ror data
      clear_ror_data: |
        delete from ror
    keys: true
    read: true
    create: true
    update: true
    # This sets versioning behavior
    versions: true
  - dataset: rdm_review_queue.ds
    query:
      # browser JSON objects by descending updated timestamp
      browse:
        select src
        from rdm_review_queue
        order by updated desc

      # Search the JSON object for a user provided value
      search: |
        select src
        from rdm_review_queue
        where src like ?
        order by updated desc

      # search by name
      by_name: |
        select src
        from rdm_review_queue
        where exists (
            select 1
            from json_each(src, '$.creators')
            where json_extract(value, '$.person_or_org.name') like ?
        )
        order by created desc


      review_queue_by_name: |
        select src
        from rdm_review_queue
        where exists (
            select 1
            from json_each(src, '$.creators')
            where json_extract(value, '$.person_or_org.name') like ?
        )
        AND src->>'status' = 'submitted'
        order by created desc

      # search by clpid
      by_clpid: |
        SELECT src
        FROM rdm_review_queue
        WHERE EXISTS (
            SELECT 1
            FROM json_each(src, '$.creators') AS creator
            JOIN json_each(creator.value, '$.person_or_org.identifiers') AS identifier
            WHERE json_extract(identifier.value, '$.scheme') = 'clpid'
              AND json_extract(identifier.value, '$.identifier') = ?
        )
        order by created desc

      review_queue_by_clpid: |
        SELECT src
        FROM rdm_review_queue
        WHERE EXISTS (
            SELECT 1
            FROM json_each(src, '$.creators') AS creator
            JOIN json_each(creator.value, '$.person_or_org.identifiers') AS identifier
            WHERE json_extract(identifier.value, '$.scheme') = 'clpid'
              AND json_extract(identifier.value, '$.identifier') = ?
        )
        AND src->>'status' = 'submitted'
        order by created desc

      # search by orcid
      by_orcid: |
        SELECT src
        FROM rdm_review_queue
        WHERE EXISTS (
            SELECT 1
            FROM json_each(src, '$.creators') AS creator
            JOIN json_each(creator.value, '$.person_or_org.identifiers') AS identifier
            WHERE json_extract(identifier.value, '$.scheme') = 'orcid'
              AND json_extract(identifier.value, '$.identifier') = ?
        )
        order by created desc

      review_queue_by_orcid: |
        SELECT src
        FROM rdm_review_queue
        WHERE EXISTS (
            SELECT 1
            FROM json_each(src, '$.creators') AS creator
            JOIN json_each(creator.value, '$.person_or_org.identifiers') AS identifier
            WHERE json_extract(identifier.value, '$.scheme') = 'orcid'
              AND json_extract(identifier.value, '$.identifier') = ?
        )
        AND src->>'status' = 'submitted'
        order by created desc

      # search by group clgid
      by_clgid: |
        SELECT src
        FROM rdm_review_queue
        WHERE EXISTS (
            SELECT 1
            FROM json_each(src, '$.custom_fields."caltech:groups"')
            WHERE json_extract(value, '$.id') = ?
        )
        order by created desc

      review_queue_by_clgid: |
        SELECT src
        FROM rdm_review_queue
        WHERE EXISTS (
            SELECT 1
            FROM json_each(src, '$.custom_fields."caltech:groups"')
            WHERE json_extract(value, '$.id') = ?
        )
        AND src->>'status' = 'submitted'
        order by created desc

      # All distinct ROR IDs that appear in any creator affiliation.
      # Used to pre-filter country ROR lists before hitting the CaltechAUTHORS API.
      unique_creator_ror_ids: |
        select json_object('ror_id', aff_id) as src
        from (
          select distinct json_extract(affiliation.value, '$.id') as aff_id
          from rdm_review_queue
          join json_each(src, '$.creators') as creator
          join json_each(creator.value, '$.affiliations') as affiliation
          where json_extract(affiliation.value, '$.id') is not null
            and json_extract(affiliation.value, '$.id') != ''
        )
        order by aff_id

      # review queue mentions
      review_queue_mentions: |
        SELECT src
        FROM rdm_review_queue
        WHERE src->>'status' = 'submitted'
          AND EXISTS (
            SELECT 1
            FROM json_each(src, '$.comments_with_mentions')
            WHERE json_extract(value, '$.content') LIKE ?
        )
        order by created desc

    keys: true
    read: true
    # datasetd requires create,update permissions for support queries
    create: true
    update: true
    # This sets versioning behavior
    versions: true
  - dataset: caltechthesis.ds
    query:

      # --- Vocabulary fetch (populate <select> dropdowns from corpus) ---

      get_distinct_divisions: |
        SELECT DISTINCT json_quote(je.value)
        FROM caltechthesis ct, json_each(ct.src, '$.divisions') je
        WHERE je.value IS NOT NULL AND je.value != '' AND je.value != 'null'
        ORDER BY je.value

      get_distinct_option_major: |
        SELECT DISTINCT json_quote(je.value)
        FROM caltechthesis ct, json_each(ct.src, '$.option_major') je
        WHERE je.value IS NOT NULL AND je.value != '' AND je.value != 'null'
        ORDER BY je.value

      get_distinct_option_minor: |
        SELECT DISTINCT json_quote(je.value)
        FROM caltechthesis ct, json_each(ct.src, '$.option_minor') je
        WHERE je.value IS NOT NULL AND je.value != '' AND je.value != 'null'
        ORDER BY je.value

      get_distinct_local_group: |
        SELECT DISTINCT json_quote(je.value)
        FROM caltechthesis ct, json_each(ct.src, '$.local_group') je
        WHERE je.value IS NOT NULL AND je.value != '' AND je.value != 'null'
        ORDER BY je.value

      # --- Text LIKE searches (* wildcard -> %) ---

      by_text: |
        SELECT src FROM caltechthesis
        WHERE src->>'fulltext_idx' LIKE ?
        ORDER BY src->>'date' DESC

      by_title: |
        SELECT src FROM caltechthesis
        WHERE src->>'title' LIKE ?
        ORDER BY src->>'date' DESC

      by_alt_title: |
        SELECT src FROM caltechthesis
        WHERE EXISTS (
          SELECT 1 FROM json_each(src, '$.alt_title') WHERE value LIKE ?
        )
        ORDER BY src->>'date' DESC

      by_abstract: |
        SELECT src FROM caltechthesis
        WHERE src->>'abstract' LIKE ?
        ORDER BY src->>'date' DESC

      by_author: |
        SELECT src FROM caltechthesis
        WHERE src->>'creator_names_idx' LIKE ?
        ORDER BY src->>'date' DESC

      by_orcid: |
        WITH q AS (SELECT ? AS pattern)
        SELECT src FROM caltechthesis, q
        WHERE src->>'creator_orcid_idx' LIKE q.pattern
           OR EXISTS (
             SELECT 1 FROM json_each(src, '$.thesis_advisor')
             WHERE json_extract(value, '$.orcid') LIKE q.pattern
           )
           OR EXISTS (
             SELECT 1 FROM json_each(src, '$.thesis_committee')
             WHERE json_extract(value, '$.orcid') LIKE q.pattern
           )
        ORDER BY src->>'date' DESC

      by_advisor: |
        SELECT src FROM caltechthesis
        WHERE src->>'advisor_names_idx' LIKE ?
        ORDER BY src->>'date' DESC

      by_committee: |
        SELECT src FROM caltechthesis
        WHERE src->>'committee_names_idx' LIKE ?
        ORDER BY src->>'date' DESC

      by_eprintid: |
        SELECT src FROM caltechthesis
        WHERE CAST(src->>'eprintid' AS INTEGER) = CAST(? AS INTEGER)

      by_doi: |
        SELECT src FROM caltechthesis
        WHERE src->>'doi' LIKE ?
        ORDER BY src->>'date' DESC

      by_reviewer: |
        SELECT src FROM caltechthesis
        WHERE src->>'reviewer' LIKE ?
        ORDER BY src->>'lastmod' DESC

      by_depositor: |
        SELECT src FROM caltechthesis
        WHERE src->>'depositor_idx' LIKE ?
        ORDER BY src->>'date' DESC

      by_depositor_username: |
        SELECT src FROM caltechthesis
        WHERE src->>'depositor_username' LIKE ?
        ORDER BY src->>'date' DESC

      by_depositor_name: |
        SELECT src FROM caltechthesis
        WHERE src->>'depositor_name' LIKE ?
        ORDER BY src->>'date' DESC

      by_funder: |
        SELECT src FROM caltechthesis
        WHERE src->>'funders_idx' LIKE ?
        ORDER BY src->>'date' DESC

      by_funder_agency: |
        SELECT src FROM caltechthesis
        WHERE EXISTS (
          SELECT 1 FROM json_each(src, '$.funders')
          WHERE json_extract(value, '$.agency') LIKE ?
        )
        ORDER BY src->>'date' DESC

      by_grant_number: |
        SELECT src FROM caltechthesis
        WHERE EXISTS (
          SELECT 1 FROM json_each(src, '$.funders')
          WHERE json_extract(value, '$.grant_number') LIKE ?
        )
        ORDER BY src->>'date' DESC

      by_local_group: |
        SELECT src FROM caltechthesis
        WHERE EXISTS (
          SELECT 1 FROM json_each(src, '$.local_group') WHERE value LIKE ?
        )
        ORDER BY src->>'date' DESC

      by_other_id: |
        SELECT src FROM caltechthesis
        WHERE src->>'other_id_idx' LIKE ?
        ORDER BY src->>'date' DESC

      by_other_numbering_name: |
        SELECT src FROM caltechthesis
        WHERE EXISTS (
          SELECT 1 FROM json_each(src, '$.other_ids')
          WHERE json_extract(value, '$.name') LIKE ?
        )
        ORDER BY src->>'date' DESC

      by_other_numbering_id: |
        SELECT src FROM caltechthesis
        WHERE EXISTS (
          SELECT 1 FROM json_each(src, '$.other_ids')
          WHERE json_extract(value, '$.id') LIKE ?
        )
        ORDER BY src->>'date' DESC

      # --- Year searches ---

      by_year: |
        SELECT src FROM caltechthesis
        WHERE CAST(src->>'date' AS INTEGER) = CAST(? AS INTEGER)
        ORDER BY src->>'creator_names_idx'

      by_year_from: |
        SELECT src FROM caltechthesis
        WHERE CAST(src->>'date' AS INTEGER) >= CAST(? AS INTEGER)
        ORDER BY src->>'date' DESC

      by_year_to: |
        SELECT src FROM caltechthesis
        WHERE CAST(src->>'date' AS INTEGER) <= CAST(? AS INTEGER)
        ORDER BY src->>'date' DESC

      # --- Multi-value ANY-of (comma-separated param, instr trick) ---

      by_eprint_status: |
        SELECT src FROM caltechthesis
        WHERE instr(',' || ? || ',', ',' || json_extract(src, '$.eprint_status') || ',') > 0
        ORDER BY src->>'lastmod' DESC

      by_review_status: |
        SELECT src FROM caltechthesis
        WHERE instr(',' || ? || ',', ',' || json_extract(src, '$.review_status') || ',') > 0
        ORDER BY src->>'lastmod' DESC

      by_full_text_status: |
        SELECT src FROM caltechthesis
        WHERE instr(',' || ? || ',', ',' || json_extract(src, '$.full_text_status') || ',') > 0
        ORDER BY src->>'date' DESC

      by_ispublished: |
        SELECT src FROM caltechthesis
        WHERE instr(',' || ? || ',', ',' || json_extract(src, '$.ispublished') || ',') > 0
        ORDER BY src->>'date' DESC

      by_date_type: |
        SELECT src FROM caltechthesis
        WHERE instr(',' || ? || ',', ',' || json_extract(src, '$.date_type') || ',') > 0
        ORDER BY src->>'date' DESC

      by_thesis_type: |
        SELECT src FROM caltechthesis
        WHERE instr(',' || ? || ',', ',' || json_extract(src, '$.thesis_type') || ',') > 0
        ORDER BY src->>'date' DESC

      by_division: |
        SELECT src FROM caltechthesis
        WHERE EXISTS (
          SELECT 1 FROM json_each(src, '$.divisions')
          WHERE instr(',' || ? || ',', ',' || value || ',') > 0
        )
        ORDER BY src->>'date' DESC

      by_option_major: |
        SELECT src FROM caltechthesis
        WHERE EXISTS (
          SELECT 1 FROM json_each(src, '$.option_major')
          WHERE instr(',' || ? || ',', ',' || value || ',') > 0
        )
        ORDER BY src->>'date' DESC

      by_option_minor: |
        SELECT src FROM caltechthesis
        WHERE EXISTS (
          SELECT 1 FROM json_each(src, '$.option_minor')
          WHERE instr(',' || ? || ',', ',' || value || ',') > 0
        )
        ORDER BY src->>'date' DESC

    keys: true
    read: true
    create: true
    update: true
